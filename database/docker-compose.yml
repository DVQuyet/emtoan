services:
  mongodb:
    image: mongo:latest
    container_name: webkiemtratoan-mongodb
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_DATABASE=webkiemtratoan
    volumes:
      - mongodb_data:/data/db
      - ./init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro

volumes:
  mongodb_data:
